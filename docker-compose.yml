version: "3.9"

services:
  research-agent:
    build: .
    container_name: ai-research-agent
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
